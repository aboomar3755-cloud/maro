<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Egg Game Pro MAX</title>

<style>
body {
    background: radial-gradient(circle at top, #1e293b, #020617);
    color: white;
    text-align: center;
    font-family: 'Segoe UI', sans-serif;
}

/* Layout */
.eggs-container {
    display: flex;
    justify-content: center;
    gap: 60px;
    margin-top: 80px;
}

/* Egg */
.egg {
    width: 110px;
    height: 150px;
    border-radius: 50% 50% 45% 45%;
    cursor: pointer;
    position: relative;
    transition: 0.3s;
    overflow: hidden;

    box-shadow:
        inset -10px -15px 25px rgba(0,0,0,0.4),
        inset 5px 5px 15px rgba(255,255,255,0.3),
        0 15px 25px rgba(0,0,0,0.6);
}

.egg:hover {
    transform: translateY(-10px) scale(1.05);
}

/* Colors */
.blue { background: linear-gradient(145deg,#60a5fa,#1d4ed8); }
.yellow { background: linear-gradient(145deg,#fde047,#eab308); }
.red { background: linear-gradient(145deg,#fca5a5,#dc2626); }
.white { background: linear-gradient(145deg,#ffffff,#d1d5db); }

/* Crack overlay */
.crack {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('https://i.imgur.com/6X12F8S.png') center/contain no-repeat;
    opacity: 0;
}

/* Crack animation */
@keyframes cracking {
    0% { opacity: 0; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.02); }
    100% { opacity: 1; transform: scale(1.05); }
}

.cracking {
    animation: cracking 1s forwards;
}

/* Chick */
.chick {
    position: absolute;
    top: 40px;
    left: 20px;
    width: 70px;
    height: 70px;
    background: radial-gradient(circle,#fde047,#facc15);
    border-radius: 50%;
    box-shadow: 0 8px 15px rgba(0,0,0,0.4);
    transform: scale(0);
}

/* Pop animation */
@keyframes pop {
    0% { transform: scale(0); top: 40px; }
    60% { transform: scale(1.2); top: -80px; }
    100% { transform: scale(1); top: -70px; }
}

.showChick {
    animation: pop 0.6s ease forwards;
}

/* Bounce */
@keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

.bounce {
    animation: bounce 1s infinite;
}

/* Eyes */
.chick::before,
.chick::after {
    content: "";
    position: absolute;
    width: 10px;
    height: 10px;
    background: black;
    border-radius: 50%;
    top: 22px;
}
.chick::before { left: 18px; }
.chick::after { right: 18px; }

/* Beak */
.beak {
    position: absolute;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 12px solid orange;
    top: 38px;
    left: 50%;
    transform: translateX(-50%);
}

/* Speech */
.speech {
    position: absolute;
    top: -120px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    color: black;
    padding: 8px 14px;
    border-radius: 12px;
    font-size: 14px;
}

/* Button */
.btn {
    margin-top: 50px;
    padding: 15px 35px;
    background: linear-gradient(45deg,#22c55e,#4ade80);
    border-radius: 20px;
    font-size: 20px;
    cursor: pointer;
    display: none;
}
</style>
</head>

<body>

<h1>🥚 Pick Your Egg</h1>

<div class="eggs-container">
    <div id="egg1" class="egg blue"></div>
    <div id="egg2" class="egg yellow"></div>
    <div id="egg3" class="egg red"></div>
    <div id="egg4" class="egg white"></div>
</div>

<button id="retry" class="btn">TRY AGAIN</button>

<!-- Sounds -->
<audio id="crackSound" src="https://assets.mixkit.co/sfx/preview/mixkit-egg-cracking-2466.mp3"></audio>
<audio id="chickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-chick-chirp-621.mp3"></audio>

<script>

let lastReward = { egg1:null, egg2:null, egg3:null, egg4:null };
const eggs = ["egg1","egg2","egg3","egg4"];
const retry = document.getElementById("retry");

const crackSound = document.getElementById("crackSound");
const chickSound = document.getElementById("chickSound");

function getReward(id){
    let rewards = [0,1,2,3];
    let filtered = rewards.filter(r => r !== lastReward[id]);
    let result = filtered[Math.floor(Math.random()*filtered.length)];
    lastReward[id] = result;
    return result;
}

eggs.forEach(id=>{
    const egg = document.getElementById(id);

    egg.addEventListener("click", ()=>{

        if(egg.classList.contains("used")) return;
        egg.classList.add("used");

        // crack layer
        const crack = document.createElement("div");
        crack.className = "crack";
        egg.appendChild(crack);

        setTimeout(()=>{
            crack.classList.add("cracking");
            crackSound.play();
        },200);

        // after crack → chick pops
        setTimeout(()=>{
            const chick = document.createElement("div");
            chick.className = "chick";

            const beak = document.createElement("div");
            beak.className = "beak";
            chick.appendChild(beak);

            egg.appendChild(chick);

            chick.classList.add("showChick");

            setTimeout(()=>{
                chick.classList.add("bounce");
                chickSound.play();
            },500);

            // speech
            const bubble = document.createElement("div");
            bubble.className = "speech";

            let reward = getReward(id);
            bubble.textContent = reward === 0
            ? "🐣 TRY AGAIN!"
            : `🐣 You won $${reward}!`;

            egg.appendChild(bubble);

        },1200);

        // disable others
        eggs.forEach(e=>{
            if(e!==id){
                let el=document.getElementById(e);
                el.style.pointerEvents="none";
                el.style.opacity="0.4";
            }
        });

        retry.style.display="inline-block";
    });
});

retry.addEventListener("click", ()=>{
    eggs.forEach(id=>{
        const egg = document.getElementById(id);

        egg.innerHTML="";
        egg.classList.remove("used");
        egg.style.pointerEvents="auto";
        egg.style.opacity="1";
    });

    retry.style.display="none";
});

</script>

</body>
</html>
