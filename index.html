<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Egg Game FINAL</title>

<style>
body {
    background: radial-gradient(circle at top, #1e293b, #020617);
    color: white;
    text-align: center;
    font-family: 'Segoe UI', sans-serif;
}

/* Layout */
.eggs-container {
    display: flex;
    justify-content: center;
    gap: 60px;
    margin-top: 120px;
    position: relative;
}

/* Egg */
.egg {
    width: 110px;
    height: 150px;
    border-radius: 50% 50% 45% 45%;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: 0.3s;

    box-shadow:
        inset -10px -15px 25px rgba(0,0,0,0.4),
        inset 5px 5px 15px rgba(255,255,255,0.3),
        0 15px 25px rgba(0,0,0,0.6);
}

.egg:hover {
    transform: translateY(-10px) scale(1.05);
}

/* Colors */
.blue { background: linear-gradient(145deg,#60a5fa,#1d4ed8); }
.yellow { background: linear-gradient(145deg,#fde047,#eab308); }
.red { background: linear-gradient(145deg,#fca5a5,#dc2626); }
.white { background: linear-gradient(145deg,#ffffff,#d1d5db); }

/* Crack */
.crack {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
}

.crack::before,
.crack::after {
    content: "";
    position: absolute;
    width: 3px;
    height: 100%;
    background: black;
    left: 50%;
    transform-origin: top;
}

.crack::before { transform: translateX(-50%) scaleY(0); }
.crack::after {
    transform: translateX(-50%) scaleY(0) rotate(10deg);
    opacity: 0.6;
}

@keyframes crackLine {
    0% { transform: translateX(-50%) scaleY(0); }
    100% { transform: translateX(-50%) scaleY(1); }
}

.cracking { opacity: 1; }
.cracking::before,
.cracking::after {
    animation: crackLine 1s forwards;
}

/* Chick */
.chick {
    position: absolute;
    top: 40px;
    left: 20px;
    width: 70px;
    height: 70px;
    background: radial-gradient(circle,#fde047,#facc15);
    border-radius: 50%;
    box-shadow: 0 8px 15px rgba(0,0,0,0.4);
    transform: scale(0);
    z-index: 5;
}

/* Pop */
@keyframes pop {
    0% { transform: scale(0); top: 40px; }
    60% { transform: scale(1.2); top: -80px; }
    100% { transform: scale(1); top: -70px; }
}

.showChick { animation: pop 0.6s ease forwards; }

/* Bounce */
@keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

.bounce { animation: bounce 1s infinite; }

/* Eyes */
.chick::before,
.chick::after {
    content: "";
    position: absolute;
    width: 10px;
    height: 10px;
    background: black;
    border-radius: 50%;
    top: 22px;
}
.chick::before { left: 18px; }
.chick::after { right: 18px; }

/* Beak */
.beak {
    position: absolute;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 12px solid orange;
    top: 38px;
    left: 50%;
    transform: translateX(-50%);
}

/* 🔥 MESSAGE FIXED */
.speech {
    position: absolute;
    top: -200px;
    left: 50%;
    transform: translateX(-50%) scale(0);
    background: white;
    color: black;
    padding: 12px 18px;
    border-radius: 16px;
    font-size: 16px;
    font-weight: bold;
    white-space: nowrap;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    z-index: 999; /* 👈 أهم حاجة */
}

/* Animation */
@keyframes popText {
    0% { transform: translateX(-50%) scale(0); }
    80% { transform: translateX(-50%) scale(1.3); }
    100% { transform: translateX(-50%) scale(1); }
}

.showText {
    animation: popText 0.4s ease forwards;
}

/* Button */
.btn {
    margin-top: 50px;
    padding: 15px 35px;
    background: linear-gradient(45deg,#22c55e,#4ade80);
    border-radius: 20px;
    font-size: 20px;
    cursor: pointer;
    display: none;
}
</style>
</head>

<body>

<h1>🥚 Pick Your Egg</h1>

<div class="eggs-container" id="container">
    <div id="egg1" class="egg blue"></div>
    <div id="egg2" class="egg yellow"></div>
    <div id="egg3" class="egg red"></div>
    <div id="egg4" class="egg white"></div>
</div>

<button id="retry" class="btn">TRY AGAIN</button>

<audio id="crackSound" src="https://assets.mixkit.co/sfx/preview/mixkit-egg-cracking-2466.mp3"></audio>
<audio id="chickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-chick-chirp-621.mp3"></audio>

<script>

let lastReward = { egg1:null, egg2:null, egg3:null, egg4:null };
const eggs = ["egg1","egg2","egg3","egg4"];
const retry = document.getElementById("retry");
const container = document.getElementById("container");

const crackSound = document.getElementById("crackSound");
const chickSound = document.getElementById("chickSound");

function getReward(id){
    let rewards = [0,1,2,3];
    let filtered = rewards.filter(r => r !== lastReward[id]);
    let result = filtered[Math.floor(Math.random()*filtered.length)];
    lastReward[id] = result;
    return result;
}

eggs.forEach(id=>{
    const egg = document.getElementById(id);

    egg.addEventListener("click", ()=>{

        if(egg.classList.contains("used")) return;
        egg.classList.add("used");

        const crack = document.createElement("div");
        crack.className = "crack";
        egg.appendChild(crack);

        setTimeout(()=>{
            crack.classList.add("cracking");
            crackSound.play();
        },200);

        setTimeout(()=>{
            const chick = document.createElement("div");
            chick.className = "chick";

            const beak = document.createElement("div");
            beak.className = "beak";
            chick.appendChild(beak);

            egg.appendChild(chick);
            chick.classList.add("showChick");

            setTimeout(()=>{
                chick.classList.add("bounce");
                chickSound.play();
            },500);

            // 🔥 MESSAGE OUTSIDE THE EGG
            const bubble = document.createElement("div");
            bubble.className = "speech";

            let reward = getReward(id);
            bubble.textContent = reward === 0
            ? "🐣 BETTER LUCK NEXT TIME!"
            : `🐣 YOU WON $${reward}!`;

            container.appendChild(bubble);

            // position above clicked egg
            const rect = egg.getBoundingClientRect();
            bubble.style.left = rect.left + rect.width/2 + "px";
            bubble.style.top = rect.top - 50 + "px";

            setTimeout(()=>{
                bubble.classList.add("showText");
            },100);

        },1200);

        eggs.forEach(e=>{
            if(e!==id){
                let el=document.getElementById(e);
                el.style.pointerEvents="none";
                el.style.opacity="0.4";
            }
        });

        retry.style.display="inline-block";
    });
});

retry.addEventListener("click", ()=>{
    eggs.forEach(id=>{
        const egg = document.getElementById(id);

        egg.innerHTML="";
        egg.classList.remove("used");
        egg.style.pointerEvents="auto";
        egg.style.opacity="1";
    });

    document.querySelectorAll(".speech").forEach(e=>e.remove());

    retry.style.display="none";
});
</script>

</body>
</html>
