<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Egg Game Pro</title>

<style>
body {
    background: radial-gradient(circle at top, #1e293b, #020617);
    color: white;
    text-align: center;
    font-family: 'Segoe UI', sans-serif;
}

/* Title */
h1 {
    margin-top: 30px;
    font-size: 32px;
}

/* Layout */
.eggs-container {
    display: flex;
    justify-content: center;
    gap: 60px;
    margin-top: 80px;
}

/* Egg 3D */
.egg {
    width: 110px;
    height: 150px;
    border-radius: 50% 50% 45% 45%;
    cursor: pointer;
    position: relative;
    transition: 0.3s;

    box-shadow:
        inset -10px -15px 25px rgba(0,0,0,0.4),
        inset 5px 5px 15px rgba(255,255,255,0.3),
        0 15px 25px rgba(0,0,0,0.6);
}

.egg:hover {
    transform: translateY(-10px) scale(1.05);
}

/* Colors */
.blue { background: linear-gradient(145deg,#60a5fa,#1d4ed8); }
.yellow { background: linear-gradient(145deg,#fde047,#eab308); }
.red { background: linear-gradient(145deg,#fca5a5,#dc2626); }
.white { background: linear-gradient(145deg,#ffffff,#d1d5db); }

/* Crack Effect */
.egg::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('https://i.imgur.com/6X12F8S.png') center/contain no-repeat;
    opacity: 0;
    transition: 0.3s;
}

.cracked::after {
    opacity: 1;
}

/* Chick */
.chick {
    position: absolute;
    top: -75px;
    left: 20px;
    width: 70px;
    height: 70px;
    background: radial-gradient(circle,#fde047,#facc15);
    border-radius: 50%;
    box-shadow: 0 8px 15px rgba(0,0,0,0.4);
    animation: bounce 1s infinite ease-in-out;
}

/* Eyes */
.chick::before,
.chick::after {
    content: "";
    position: absolute;
    width: 10px;
    height: 10px;
    background: black;
    border-radius: 50%;
    top: 22px;
}

.chick::before { left: 18px; }
.chick::after { right: 18px; }

/* Beak */
.beak {
    position: absolute;
    width: 0;
    height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 12px solid orange;
    top: 38px;
    left: 50%;
    transform: translateX(-50%);
}

/* Wings */
.wing {
    position: absolute;
    width: 20px;
    height: 20px;
    background: #facc15;
    border-radius: 50%;
    top: 35px;
}

.wing.left { left: -10px; }
.wing.right { right: -10px; }

/* Animation */
@keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
}

/* Speech bubble */
.speech {
    position: absolute;
    top: -120px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    color: black;
    padding: 8px 14px;
    border-radius: 12px;
    font-size: 14px;
    white-space: nowrap;
    box-shadow: 0 5px 10px rgba(0,0,0,0.3);
}

/* Button */
.btn {
    margin-top: 50px;
    padding: 15px 35px;
    background: linear-gradient(45deg,#22c55e,#4ade80);
    border-radius: 20px;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
    display: none;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
}
</style>
</head>

<body>

<h1>🥚 Pick Your Egg</h1>

<div class="eggs-container">
    <div id="egg1" class="egg blue"></div>
    <div id="egg2" class="egg yellow"></div>
    <div id="egg3" class="egg red"></div>
    <div id="egg4" class="egg white"></div>
</div>

<button id="retry" class="btn">TRY AGAIN</button>

<script>

let lastReward = { egg1:null, egg2:null, egg3:null, egg4:null };
const eggs = ["egg1","egg2","egg3","egg4"];
const retry = document.getElementById("retry");

function getReward(id){
    let rewards = [0,1,2,3];
    let filtered = rewards.filter(r => r !== lastReward[id]);
    let result = filtered[Math.floor(Math.random()*filtered.length)];
    lastReward[id] = result;
    return result;
}

eggs.forEach(id=>{
    const egg = document.getElementById(id);

    egg.addEventListener("click", ()=>{

        if(egg.classList.contains("cracked")) return;

        egg.classList.add("cracked");

        // Create chick
        const chick = document.createElement("div");
        chick.className = "chick";

        const beak = document.createElement("div");
        beak.className = "beak";

        const wingL = document.createElement("div");
        wingL.className = "wing left";

        const wingR = document.createElement("div");
        wingR.className = "wing right";

        chick.appendChild(beak);
        chick.appendChild(wingL);
        chick.appendChild(wingR);

        egg.appendChild(chick);

        // Speech
        const bubble = document.createElement("div");
        bubble.className = "speech";
        egg.appendChild(bubble);

        let reward = getReward(id);

        bubble.textContent = reward === 0
        ? "🐣 TRY AGAIN!"
        : `🐣 You won $${reward}!`;

        // Disable others
        eggs.forEach(e=>{
            if(e !== id){
                let el = document.getElementById(e);
                el.style.pointerEvents="none";
                el.style.opacity="0.5";
            }
        });

        retry.style.display="inline-block";
    });
});

retry.addEventListener("click", ()=>{

    eggs.forEach(id=>{
        const egg = document.getElementById(id);

        egg.classList.remove("cracked");
        egg.style.pointerEvents="auto";
        egg.style.opacity="1";

        const chick = egg.querySelector(".chick");
        const bubble = egg.querySelector(".speech");

        if(chick) chick.remove();
        if(bubble) bubble.remove();
    });

    retry.style.display="none";
});

</script>

</body>
</html>
